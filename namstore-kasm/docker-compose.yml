version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: namstore-kasm_redirect_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"
    depends_on:
      - redirect
      - kasm

  redirect:
    image: nginx:alpine
    container_name: namstore-kasm_redirect_1
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 8080;
          server_name _;
          location / {
            return 302 https://$$host:4443$$request_uri;
          }
        }
        EOF
        nginx -g 'daemon off;'

  kasm:
    image: lscr.io/linuxserver/kasm:latest
    container_name: namstore-kasm_kasm_1
    privileged: true
    security_opt:
      - apparmor:rootlesskit
    restart: unless-stopped
    stop_grace_period: 90s
    environment:
      - KASM_PORT=4443
      - DOCKER_MTU=1500
      - TZ=${TZ}
    volumes:
      - ${APP_DATA_DIR}/data:/opt
      - ${APP_DATA_DIR}/profiles:/profiles
    ports:
      # LinuxServer Kasm's first-run installer listens on HTTPS port 3000 inside the container.
      # Use a higher host port to avoid clashing with other apps that commonly bind 3000.
      - "33000:3000"
      # Main Kasm UI.
      - "4443:4443"
