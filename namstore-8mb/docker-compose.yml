version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: namstore-8mb_web_1
      APP_PORT: 3000

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
    environment:
      NODE_ENV: production
      MAX_UPLOAD_MB: 2048