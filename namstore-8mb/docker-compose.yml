services:
  app_proxy:
    environment:
      APP_HOST: web
      APP_PORT: 3000
    depends_on:
      - web

  web:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm install --omit=dev --no-audit --no-fund && npm start"
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/server.js:/app/server.js:ro
      - ${APP_DATA_DIR}/package.json:/app/package.json:ro
      - ${APP_DATA_DIR}/public:/app/public:ro
      - ${APP_DATA_DIR}/node_modules:/app/node_modules
      - ${APP_DATA_DIR}/data:/app/data
    environment:
      NODE_ENV: production
      MAX_UPLOAD_MB: 2048
