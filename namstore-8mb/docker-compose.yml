services:
  app_proxy:
    environment:
      APP_HOST: namstore-8mb_web_1
      APP_PORT: 8001
    depends_on:
      web:
        condition: service_healthy

  web:
    image: jms1717/8mblocal:latest
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/uploads:/app/uploads
      - ${APP_DATA_DIR}/outputs:/app/outputs
    environment:
      AUTH_ENABLED: "false"
      FILE_RETENTION_HOURS: "1"
      WORKER_CONCURRENCY: "1"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/', timeout=2)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
