manifestVersion: 1
id: namstore-8mb
name: 8mb.local
tagline: Compress videos to a target file size locally
category: media
version: "1.0.1"
port: 3000
icon: https://raw.githubusercontent.com/Nam-H-Pham/umbrel-nams-apps/master/namstore-8mb/icon.svg
description: >-
  8mb.local is a simple local-first video compressor for Umbrel. Upload a video,
  choose a target size such as 8 MB or 10 MB, and it will use FFmpeg locally to
  create a compressed MP4.
developer: Nam Pham
website: https://github.com/Nam-H-Pham/umbrel-nams-apps
submitter: Nam Pham
submission: https://github.com/Nam-H-Pham/umbrel-nams-apps
repo: https://github.com/Nam-H-Pham/umbrel-nams-apps
support: https://github.com/Nam-H-Pham/umbrel-nams-apps/issues
gallery: []
releaseNotes: >-
  Fix Umbrel proxy routing, remove the local Docker build requirement, and add
  clearer handling for target sizes that are too small for the uploaded video.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
