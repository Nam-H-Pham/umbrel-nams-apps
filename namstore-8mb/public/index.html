<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>8mb.local</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="card">
      <img class="app-icon" src="/icon.svg" alt="8mb.local icon" />
      <p class="eyebrow">Local-first video compression</p>
      <h1>8mb.local</h1>
      <p class="summary">Upload a video, choose a target size, and compress it locally on your Umbrel using FFmpeg.</p>

      <form id="form">
        <label>
          Video file
          <input id="video" name="video" type="file" accept="video/*" required />
        </label>

        <div class="grid">
          <label>
            Target size MB
            <input name="targetMb" type="number" value="8" min="1" max="2000" step="1" required />
          </label>

          <label>
            Audio kbps
            <input name="audioKbps" type="number" value="96" min="32" max="320" step="1" required />
          </label>
        </div>

        <button id="button" type="submit">Compress</button>
      </form>

      <section id="status" class="status" aria-live="polite"></section>
    </main>

    <script>
      const form = document.querySelector("#form");
      const status = document.querySelector("#status");
      const button = document.querySelector("#button");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        status.textContent = "Compressing... This can take a while for large videos.";
        button.disabled = true;

        try {
          const response = await fetch("/compress", {
            method: "POST",
            body: new FormData(form),
          });

          const result = await response.json();
          if (!response.ok) throw new Error(result.error || "Compression failed.");

          status.innerHTML = `Done. Output: ${result.outputMb} MB. <a href="${result.downloadUrl}" download>Download compressed video</a>`;
        } catch (error) {
          status.textContent = error.message;
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
