version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: vaultwarden
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"
    depends_on:
      - vaultwarden

  vaultwarden:
    image: vaultwarden/server:latest
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      - SIGNUPS_ALLOWED=true
      - INVITATIONS_ALLOWED=true
      - WEBSOCKET_ENABLED=true
      - ROCKET_PORT=80
