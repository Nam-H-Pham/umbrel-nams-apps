version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: namstore-neolink_web_1
      APP_PORT: 80

  web:
    image: nginx:1.27-alpine
    restart: on-failure
    command: >-
      sh -c 'printf "%s\n" "<h1>Neolink</h1><p>Edit the local config file, then restart this app.</p>" > /usr/share/nginx/html/index.html && nginx -g "daemon off;"'

  neolink:
    image: quantumentangledandy/neolink:latest
    restart: on-failure
    environment:
      NEO_LINK_MODE: rtsp
      NEO_LINK_PORT: 8554
    ports:
      - "8554:8554"
    volumes:
      - ${APP_DATA_DIR}/data/neolink.toml:/etc/neolink.toml:ro
