version: '3.7'

services:
  app_proxy:
    environment:
      # Format: <app-id>_<docker-service-name>_1
      APP_HOST: namstore-overleaf_web_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  web:
    image: sharelatex/sharelatex:4.2.8@sha256:904776b0e0722ba4f44e5397cba33bfe9584488c74c0aa7accce96a2477b2761
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ${APP_DATA_DIR}/data/sharelatex:/var/lib/sharelatex
    environment:
      SHARELATEX_APP_NAME: Overleaf
      SHARELATEX_MONGO_URL: mongodb://mongo/sharelatex
      SHARELATEX_REDIS_HOST: redis
      REDIS_HOST: redis
      ENABLED_LINKED_FILE_TYPES: "project_file,project_output_file"
      ENABLE_CONVERSIONS: "true"
      EMAIL_CONFIRMATION_DISABLED: "true"
      TEXMFVAR: /var/lib/sharelatex/tmp/texmf-var

  mongo:
    image: mongo:4.4@sha256:52c42cbab240b3c5b1748582cc13ef46d521ddacae002bbbda645cebed270ec0
    command: "--replSet overleaf"
    expose:
      - 27017
    volumes:
      - ${APP_DATA_DIR}/data/mongo:/data/db
    healthcheck:
      test: echo 'db.stats().ok' | mongo localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:6.2@sha256:5610a8ffeaf386ecc7b6c8f070662a7a9d01bc7eafe237152a7d16e05b84afc9
    expose:
      - 6379
    volumes:
      - ${APP_DATA_DIR}/data/redis:/data

  mongo-init-replica:
    image: mongo:4.4
    depends_on:
      - mongo
    entrypoint: >
      bash -c "
      until mongo --host mongo --eval 'print(\"waiting for mongo\")'; do sleep 2; done;
      mongo --host mongo --eval 'rs.initiate({_id: \"overleaf\", members: [{_id: 0, host: \"mongo:27017\"}]})'"
    restart: "on-failure"

# This version intentionally uses a pullable image because Umbrel custom app installs do not build local Dockerfiles.
# For complex LaTeX documents, install extra TeX Live packages inside the web container after installation.
