version: "3.7"

services:

  app_proxy:
    environment:
      PORT: 3000
      APP_HOST: host.docker.internal
      APP_PORT: 8090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - upsnap

  upsnap:
    image: ghcr.io/seriousm4x/upsnap:5
    init: true
    network_mode: host
    cap_add:
      - NET_RAW
    cap_drop:
      - ALL
    volumes:
      - ./data:/app/pb_data
    environment:
      - UPSNAP_HTTP_LISTEN=0.0.0.0:8090
