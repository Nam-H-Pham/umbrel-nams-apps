version: "3.7"

services:

  app_proxy:
    network_mode: host
    environment:
      APP_HOST: 127.0.0.1
      APP_PORT: 8090
    depends_on:
      - upsnap

  upsnap:
    image: ghcr.io/seriousm4x/upsnap:5
    init: true
    network_mode: host
    cap_add:
      - NET_RAW
    cap_drop:
      - ALL
    volumes:
      - ./data:/app/pb_data
    environment:
      - UPSNAP_HTTP_LISTEN=0.0.0.0:8090
