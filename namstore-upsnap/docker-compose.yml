version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: host.docker.internal
      APP_PORT: 28766
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - upsnap

  upsnap:
    image: ghcr.io/seriousm4x/upsnap:5
    init: true
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_RAW
    volumes:
      - ${APP_DATA_DIR}/data:/app/pb_data
    environment:
      UPSNAP_HTTP_LISTEN: 0.0.0.0:28766
