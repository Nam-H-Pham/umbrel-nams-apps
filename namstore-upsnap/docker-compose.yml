version: "3.7"

services:
  app_proxy:
    environment:
      PORT: 3000
      APP_HOST: namstore-upsnap_upsnap_1
      APP_PORT: 8091
    depends_on:
      upsnap:
        condition: service_healthy

  upsnap:
    image: ghcr.io/seriousm4x/upsnap:5
    init: true
    container_name: namstore-upsnap_upsnap_1
    restart: unless-stopped
    cap_add:
      - NET_RAW
    volumes:
      - ${APP_DATA_DIR}/data:/app/pb_data
    environment:
      - UPSNAP_HTTP_LISTEN=0.0.0.0:8091
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:8091/_/ || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
