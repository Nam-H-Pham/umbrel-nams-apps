manifestVersion: 1
id: denny-overleaf
name: Overleaf
tagline: Self-hosted LaTeX editor with a fuller TeX Live install
icon: https://raw.githubusercontent.com/dennysubke/dennys-umbrel-app-gallery/main/denny-overleaf/logo.png
category: files & productivity
version: "4.2.8-full-texlive"
port: 8063
description: >-
  Overleaf is a web-based LaTeX editor for writing, formatting, and collaborating on technical documents, reports, resumes, papers, and other LaTeX projects.


  This Namstore build is based on Denny's Overleaf Umbrel app, but replaces the stock web container with a custom image that installs a much broader TeX Live package set. This helps compile more complex documents and templates that use packages such as xcolor, latexsym, fullpage, titlesec, enumitem, hyperref, fancyhdr, babel, tabularx, glyphtounicode, XeLaTeX, LuaLaTeX, latexmk, BibTeX, and Biber.


  🔑 Once the Overleaf instance is running, visit "umbrel.local:8063/launchpad" to set up your first admin user.
developer: Overleaf Ltd.
