version: "3.7"

services:
  app_proxy:
    environment:
      PORT: 3000
      APP_HOST: namstore-materialious_server_1
      APP_PORT: 3000
    depends_on:
      - server

  server:
    image: wardpearce/materialious-full:latest
    restart: on-failure
    environment:
      PORT: 3000
      COOKIE_SECRET: materialious-change-me
      DATABASE_CONNECTION_URI: sqlite:///materialious-data/materialious.db
      # Umbrel already protects app access via its proxy, so Materialious account auth is disabled by default.
      PUBLIC_INTERNAL_AUTH: "false"
      PUBLIC_REQUIRE_AUTH: "false"
      PUBLIC_REGISTRATION_ALLOWED: "false"
      # POW captcha requires HTTPS, so disable it for local Umbrel HTTP installs.
      PUBLIC_CAPTCHA_DISABLED: "true"
      PUBLIC_DEFAULT_RETURNYTDISLIKES_INSTANCE: https://returnyoutubedislikeapi.com
      PUBLIC_DEFAULT_SPONSERBLOCK_INSTANCE: https://sponsor.ajay.app
      PUBLIC_DEFAULT_DEARROW_INSTANCE: https://sponsor.ajay.app
      PUBLIC_DEFAULT_DEARROW_THUMBNAIL_INSTANCE: https://dearrow-thumb.ajay.app
    volumes:
      - ${APP_DATA_DIR}/data:/materialious-data
    container_name: namstore-materialious_server_1
