manifestVersion: 1

id: namstore-materialious
name: Materialious
tagline: Modern privacy-friendly YouTube frontend
icon: https://raw.githubusercontent.com/Nam-H-Pham/umbrel-nams-apps/master/namstore-materialious/icon.svg
category: Media
version: "1.16.30"
