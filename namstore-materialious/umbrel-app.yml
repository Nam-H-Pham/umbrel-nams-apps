description: >-
  Materialious is a modern Material Design frontend for YouTube and Invidious,
  focused on a clean, privacy-friendly YouTube experience without ads or
  tracking. It can work without an Invidious instance by using its YouTube
  backend, and includes features such as SponsorBlock, Return YouTube Dislike,
  DeArrow, playlists, live streams, themes, and PWA support.

