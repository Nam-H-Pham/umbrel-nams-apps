version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: namstore-go2rtc_server_1
      APP_PORT: 1984
      PROXY_AUTH_ADD: "false"

  server:
    image: alexxit/go2rtc:latest
    restart: unless-stopped
    init: true
    volumes:
      - ${APP_DATA_DIR}/data:/config
    ports:
      - "1985:1984"
      - "8555:8554"
      - "8556:8555/tcp"
      - "8556:8555/udp"
    environment:
      - TZ=${TZ}
